name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Soroban contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check workspace
        run: cargo check --workspace

      - name: Test poker-table contract
        run: cargo test -p poker-table

      - name: Audit contract storage access
        run: python3 scripts/audit_storage_access.py

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  circuits:
    name: Noir circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Nargo toolchain
        uses: actions/cache@v4
        with:
          # compile-circuits.sh downloads a pinned Nargo release into
          # .tmp_tools and uses .tmp_nargo_home as an isolated NARGO/HOME.
          path: |
            .tmp_tools
            .tmp_nargo_home
          key: ${{ runner.os }}-nargo-1.0.0-beta.17
          restore-keys: ${{ runner.os }}-nargo-

      - name: Cache compiled circuit artifacts
        uses: actions/cache@v4
        with:
          # Compiled ACIR per circuit. Keyed on the nargo version + a hash of
          # every circuit source so any change busts the cache. No restore-keys
          # on purpose: a partial match would restore artifacts built from
          # different sources, which compile-circuits.sh (mtime-based) would
          # then wrongly treat as up to date and skip. Exact match only.
          path: |
            circuits/deal_valid/target
            circuits/reveal_board_valid/target
            circuits/showdown_valid/target
          key: ${{ runner.os }}-circuits-1.0.0-beta.17-${{ hashFiles('circuits/**/src/**/*.nr', 'circuits/**/Nargo.toml') }}

      - name: Compile all Noir circuits
        run: ./scripts/compile-circuits.sh

      - name: Install Nargo for tests
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/refs/heads/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          $HOME/.nargo/bin/noirup -v 1.0.0-beta.17

      - name: Run Noir library tests
        run: cd circuits/lib && nargo test

  e2e-hand-lifecycle:
    name: Full hand lifecycle e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2e-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-e2e-cargo-

      - name: Cache Nargo toolchain and CRS
        uses: actions/cache@v4
        with:
          path: |
            .tmp_tools
            .tmp_nargo_home
            crs
          key: ${{ runner.os }}-e2e-nargo-crs-1.0.0-beta.17
          restore-keys: ${{ runner.os }}-e2e-nargo-crs-

      - name: Compile circuits
        run: ./scripts/compile-circuits.sh

      - name: Download CRS
        run: ./scripts/download-crs.sh

      - name: Install Python flow dependencies
        run: python3 -m pip install requests pynacl

      - name: Start Soroban and MPC stack
        run: docker compose up -d --build soroban mpc-node-0 mpc-node-1 mpc-node-2 coordinator

      - name: Run full hand lifecycle flow
        run: python3 scripts/test-flow.py

      - name: Install schemathesis for conformance test
        run: pip install schemathesis pyyaml

      - name: Live API conformance against coordinator
        env:
          COORDINATOR_URL: http://localhost:8080
        run: python3 scripts/check-api-spec.py

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down --remove-orphans

  visual-regression:
    name: Visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Install Playwright browsers
        run: cd app && npx playwright install --with-deps chromium

      - name: Build
        run: cd app && npm run build
        env:
          NEXT_PUBLIC_COORDINATOR_URL: http://localhost:8080

      - name: Run screenshot tests (update snapshots on push to main)
        if: github.event_name == 'push'
        run: cd app && npx playwright test --config=e2e/playwright.config.ts --project=chromium --update-snapshots tests/visual-regression.spec.ts
        env:
          CI: true

      - name: Run screenshot tests (compare on PR)
        if: github.event_name == 'pull_request'
        run: cd app && npx playwright test --config=e2e/playwright.config.ts --project=chromium tests/visual-regression.spec.ts
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: app/playwright-report/

  frontend:
    name: Next.js frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Lint
        run: cd app && npm run lint

      - name: Build
        run: cd app && npm run build
        env:
          NEXT_PUBLIC_COORDINATOR_URL: http://localhost:8080
