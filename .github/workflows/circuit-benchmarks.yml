name: Circuit Benchmarks

on:
  push:
    paths:
      - circuits/**
      - scripts/circuit_constraints.py
      - .github/workflows/circuit-benchmarks.yml
  pull_request:
    paths:
      - circuits/**
      - scripts/circuit_constraints.py
      - .github/workflows/circuit-benchmarks.yml

env:
  NOIR_VERSION: 1.0.0-beta.17

jobs:
  benchmarks:
    name: Constraint budgets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4
        with:
          path: current
          fetch-depth: 0

      - name: Checkout comparison ref
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          path: baseline
          fetch-depth: 1
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}

      - name: Install Nargo
        working-directory: current
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/refs/heads/main/install | bash
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
          "$HOME/.nargo/bin/noirup" -v "$NOIR_VERSION"

      - name: Install bb
        run: |
          curl -fsSL https://raw.githubusercontent.com/AztecProtocol/aztec-packages/refs/heads/next/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> "$GITHUB_PATH"
          "$HOME/.bb/bbup"

      - name: Compile current circuits
        working-directory: current
        run: ./scripts/compile-circuits.sh

      - name: Collect current constraint metrics
        working-directory: current
        run: python3 scripts/circuit_constraints.py --refresh --output-dir reports/circuits-current

      - name: Compile baseline circuits
        id: baseline_compile
        continue-on-error: true
        working-directory: baseline
        run: ./scripts/compile-circuits.sh

      - name: Collect baseline constraint metrics
        id: baseline_collect
        if: steps.baseline_compile.outcome == 'success'
        continue-on-error: true
        working-directory: baseline
        run: python3 ../current/scripts/circuit_constraints.py --repo "$PWD" --refresh --output-dir reports/circuits-baseline

      - name: Compare current against baseline
        if: steps.baseline_collect.outcome == 'success'
        working-directory: current
        run: |
          python3 scripts/circuit_constraints.py \
            --baseline ../baseline/reports/circuits-baseline/circuit-constraints.json \
            --output-dir reports/circuits

      - name: Use budget-only report when no baseline is available
        if: steps.baseline_collect.outcome != 'success'
        working-directory: current
        run: cp -R reports/circuits-current reports/circuits

      - name: Publish step summary
        if: always()
        working-directory: current
        run: |
          if [ -f reports/circuits/circuit-constraints.md ]; then
            cat reports/circuits/circuit-constraints.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload circuit constraint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: circuit-constraint-report
          path: current/reports/circuits

      - name: Comment PR
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'current/reports/circuits/circuit-constraints.md';
            if (!fs.existsSync(path)) return;
            const body = fs.readFileSync(path, 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
